name: Monorepo CI (Web + Mobile + Shared)

on:
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/**"
      - "mobile/**"
      - "packages/shared/**"
      - "package.json"
      - ".github/workflows/monorepo-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - "mobile/**"
      - "packages/shared/**"
      - "package.json"
      - ".github/workflows/monorepo-ci.yml"

permissions:
  contents: read

jobs:
  web:
    name: Web build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  shared:
    name: Shared package check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Shared build script
        working-directory: packages/shared
        run: npm run build

  mobile:
    name: Mobile typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install mobile deps
        working-directory: mobile
        run: npm install
      - name: Typecheck mobile
        working-directory: mobile
        run: npm run typecheck
