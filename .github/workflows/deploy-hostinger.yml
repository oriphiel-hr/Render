name: Hostinger – Deploy frontenda Registra poslovnih subjekata

on:
  # Ručni run (Actions → Deploy frontend to Hostinger → Run workflow)
  workflow_dispatch:
  # Automatski deploy na push u main (po želji možeš maknuti ovaj dio)
  push:
    branches:
      - main
    paths:
      - "RegistarPoslovnihSubjekata/**"
      - ".github/workflows/deploy-hostinger.yml"

jobs:
  deploy-registar-hostinger:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show prepared frontend files
        run: |
          echo "Sadržaj RegistarPoslovnihSubjekata/hostinger-frontend:"
          ls -R RegistarPoslovnihSubjekata/hostinger-frontend

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_REGISTARPOSLOVNIHSUBJEKATA_HOST }}
          username: ${{ secrets.HOSTINGER_REGISTARPOSLOVNIHSUBJEKATA_USERNAME }}
          password: ${{ secrets.HOSTINGER_REGISTARPOSLOVNIHSUBJEKATA_PASSWORD }}
          server-dir: ${{ secrets.HOSTINGER_REGISTARPOSLOVNIHSUBJEKATA_SERVER_DIR }}/
          local-dir: RegistarPoslovnihSubjekata/hostinger-frontend/
          protocol: ftps
          port: 21
          dangerous-clean-slate: false

