name: uslugar-webhooks CI

on:
  push:
    branches: [main, master]
    paths:
      - "uslugar-webhooks/**"
      - ".github/workflows/uslugar-webhooks-ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "uslugar-webhooks/**"
      - ".github/workflows/uslugar-webhooks-ci.yml"
  workflow_dispatch:

concurrency:
  group: uslugar-webhooks-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: uslugar-webhooks
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: uslugar-webhooks/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Syntax check
        run: |
          node --check src/index.js
          node --check src/routes/facebookWebhook.js
          node --check src/routes/ingestApi.js
          node --check src/routes/adminApi.js
          node --check src/middleware/adminAuth.js
          node --check src/services/messageQuery.js
          node --check src/services/facebookHistorySync.js
