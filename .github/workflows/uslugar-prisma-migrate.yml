# Uslugar backend: Prisma validate, generate, migrate status + deploy.
# Mora biti u root .github/ repozitorija (npr. Render) — Uslugar/backend/...

name: Uslugar – Prisma baza

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "Uslugar/backend/prisma/**"
      - ".github/workflows/uslugar-prisma-migrate.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "Uslugar/backend/prisma/**"
      - ".github/workflows/uslugar-prisma-migrate.yml"

permissions:
  contents: read

env:
  BACKEND_DIR: Uslugar/backend
  NODE_VERSION: "20"

jobs:
  validate-and-generate:
    name: Validate + generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.BACKEND_DIR }}/package-lock.json
      - name: npm ci
        working-directory: ${{ env.BACKEND_DIR }}
        run: npm ci
      - name: Prisma validate
        working-directory: ${{ env.BACKEND_DIR }}
        run: npx prisma validate --schema=prisma/schema.prisma
      - name: Prisma generate
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          DATABASE_URL: postgresql://prisma:prisma@127.0.0.1:5432/dummy
        run: npm run prisma:generate

  db-migrate:
    name: Prisma status + deploy (treba DATABASE_URL u Secrets)
    needs: [validate-and-generate]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.BACKEND_DIR }}/package-lock.json
      - name: npm ci
        working-directory: ${{ env.BACKEND_DIR }}
        run: npm ci
      - name: Povezivanje na Render Postgres + migracije
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "⏭️  DATABASE_URL nije postavljen u GitHub Actions secrets – preskačem status/deploy."
            echo "   Settings → Secrets and variables → Actions → new repository secret: DATABASE_URL"
            exit 0
          fi
          echo "📋 prisma migrate status:"
          npx prisma migrate status --schema=prisma/schema.prisma
          npm run prisma:generate
          echo "🚀 prisma migrate deploy:"
          npm run migrate:deploy
          echo "✅ Baza usklađena s repom (migrate deploy)."
