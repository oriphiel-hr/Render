<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Registar poslovnih subjekata</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4f;
      --text: #e8eef7;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --accent-hover: #5ca0ff;
      --sudreg: #2eb88a;
      --sudreg-hover: #45d4a3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    main {
      width: min(42rem, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem;
    }
    h1 {
      margin: 0 0 0.35rem;
      font-size: 1.25rem;
      font-weight: 600;
    }
    p.hint {
      margin: 0 0 1.25rem;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }
    .section-label {
      margin: 0 0 0.45rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .section-label:not(:first-of-type) { margin-top: 1rem; }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-bottom: 0.25rem;
    }
    button {
      cursor: pointer;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      font-size: 0.95rem;
      padding: 0.55rem 1rem;
      border-radius: 8px;
    }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    button.secondary {
      background: transparent;
      color: var(--text);
      border-color: var(--border);
    }
    button.secondary:hover:not(:disabled) {
      border-color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
    }
    pre#response {
      margin: 0;
      padding: 1rem;
      background: #0a0e14;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.82rem;
      line-height: 1.5;
      overflow: auto;
      max-height: 24rem;
      white-space: pre-wrap;
      word-break: break-word;
      color: #b8d4ff;
    }
    pre#response.empty { color: var(--muted); font-style: italic; }
    .meta {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .field-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: center;
      margin-bottom: 0.65rem;
    }
    .field-row label {
      font-size: 0.85rem;
      color: var(--muted);
      flex: 0 0 100%;
    }
    select#snapshot-select {
      flex: 1 1 14rem;
      min-width: 0;
      padding: 0.55rem 0.65rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0a0e14;
      color: var(--text);
      font-size: 0.9rem;
    }
    select#snapshot-select:disabled { opacity: 0.55; }
    .field-row input[type="number"] {
      width: 6.5rem;
      padding: 0.55rem 0.65rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0a0e14;
      color: var(--text);
      font-size: 0.9rem;
    }
    .field-row .inline-label {
      flex: 0 0 auto;
      width: auto;
      margin-right: 0.25rem;
    }
    .field-row .inline-group {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex: 0 0 auto;
    }
    .snapshot-detail {
      margin: 0 0 0.75rem;
      padding: 0.65rem 0.85rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(46, 184, 138, 0.08);
      font-size: 0.85rem;
      line-height: 1.45;
      color: var(--muted);
    }
    .snapshot-detail strong { color: var(--text); }
    .snapshot-detail.empty { display: none; }
  </style>
</head>
<body>
  <main>
    <h1>Registar poslovnih subjekata</h1>
    <p class="hint">Snimke se učitavaju pri otvaranju stranice. Osvježi s <strong>Ctrl+F5</strong> nakon deploya.</p>
    <p class="section-label">Servis</p>
    <div class="actions">
      <button type="button" id="btn-status">Provjeri status</button>
      <button type="button" class="secondary" id="btn-health">Health (tekst)</button>
    </div>
    <p class="section-label">Sudreg API — snimke</p>
    <div class="field-row">
      <label for="snapshot-select">Snapshot (snapshot_id za ostale API pozive)</label>
      <select id="snapshot-select" disabled>
        <option value="">Učitavam snimke…</option>
      </select>
      <button type="button" class="secondary" id="btn-snapshots-refresh">Osvježi</button>
    </div>
    <div id="snapshot-detail" class="snapshot-detail empty"></div>
    <div class="actions">
      <button type="button" class="secondary" id="btn-sudreg">OAuth token</button>
      <button type="button" class="secondary" id="btn-snapshots-json">JSON svih snimki</button>
    </div>
    <p class="section-label">Sudreg API — promjene</p>
    <div class="field-row">
      <label>Straničenje (GET /promjene)</label>
      <div class="inline-group">
        <span class="inline-label">offset</span>
        <input type="number" id="promjene-offset" min="0" step="1" value="0" />
      </div>
      <div class="inline-group">
        <span class="inline-label">limit</span>
        <input type="number" id="promjene-limit" min="1" step="1" value="1000" />
      </div>
    </div>
    <div class="actions">
      <button type="button" id="btn-promjene">Dohvati promjene</button>
    </div>
    <pre id="response" class="empty">Odaberi snapshot ili klikni gumb…</pre>
    <p class="meta" id="meta"></p>
    <p class="meta">UI v4</p>
  </main>
  <script>
    const out = document.getElementById('response');
    const meta = document.getElementById('meta');
    const btnStatus = document.getElementById('btn-status');
    const btnHealth = document.getElementById('btn-health');
    const btnSudreg = document.getElementById('btn-sudreg');
    const btnSnapshotsRefresh = document.getElementById('btn-snapshots-refresh');
    const btnSnapshotsJson = document.getElementById('btn-snapshots-json');
    const btnPromjene = document.getElementById('btn-promjene');
    const promjeneOffset = document.getElementById('promjene-offset');
    const promjeneLimit = document.getElementById('promjene-limit');
    const snapshotSelect = document.getElementById('snapshot-select');
    const snapshotDetail = document.getElementById('snapshot-detail');

    const snapshotsById = {};

    function setBusy(busy) {
      btnStatus.disabled = busy;
      btnHealth.disabled = busy;
      btnSudreg.disabled = busy;
      btnSnapshotsRefresh.disabled = busy;
      btnSnapshotsJson.disabled = busy;
      btnPromjene.disabled = busy;
      promjeneOffset.disabled = busy;
      promjeneLimit.disabled = busy;
      if (busy) snapshotSelect.disabled = true;
      else snapshotSelect.disabled = Object.keys(snapshotsById).length === 0;
    }

    function show(text, isError) {
      out.textContent = text;
      out.classList.toggle('empty', !text || text.startsWith('Odaberi'));
      out.style.color = isError ? '#f5a8a8' : '#b8d4ff';
    }

    function escapeHtml(t) {
      return String(t)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function formatSnapshotLabel(s) {
      const id = s.id != null ? String(s.id) : '?';
      const ts = s.timestamp ? String(s.timestamp).replace('T', ' ').slice(0, 19) : '';
      const stale = s.staleness != null ? ' · starost ' + s.staleness : '';
      const desc = s.description ? ' · ' + String(s.description).slice(0, 48) : '';
      return '#' + id + (ts ? ' · ' + ts : '') + stale + desc;
    }

    function renderSnapshotDetail(s) {
      if (!s) {
        snapshotDetail.classList.add('empty');
        snapshotDetail.textContent = '';
        return;
      }
      snapshotDetail.classList.remove('empty');
      snapshotDetail.innerHTML =
        '<strong>snapshot_id:</strong> ' + escapeHtml(String(s.id)) +
        '<br><strong>timestamp:</strong> ' + escapeHtml(String(s.timestamp || '—')) +
        '<br><strong>available_until:</strong> ' + escapeHtml(String(s.available_until || '—')) +
        '<br><strong>staleness:</strong> ' + escapeHtml(String(s.staleness != null ? s.staleness : '—')) +
        (s.description ? '<br><strong>opis:</strong> ' + escapeHtml(String(s.description)) : '');
    }

    function normalizeSnapshotsList(payload) {
      if (Array.isArray(payload)) return payload;
      if (payload && Array.isArray(payload.data)) return payload.data;
      return [];
    }

    function fillSnapshotDropdown(list) {
      Object.keys(snapshotsById).forEach((k) => delete snapshotsById[k]);
      snapshotSelect.innerHTML = '';
      const sorted = list.slice().sort((a, b) => {
        const sa = a.staleness != null ? Number(a.staleness) : 999;
        const sb = b.staleness != null ? Number(b.staleness) : 999;
        if (sa !== sb) return sa - sb;
        return Number(b.id) - Number(a.id);
      });
      if (!sorted.length) {
        snapshotSelect.appendChild(new Option('Nema snimki', ''));
        snapshotSelect.disabled = true;
        snapshotDetail.classList.add('empty');
        return;
      }
      snapshotSelect.appendChild(new Option('— odaberi snapshot —', ''));
      sorted.forEach((s) => {
        const id = String(s.id);
        snapshotsById[id] = s;
        snapshotSelect.appendChild(new Option(formatSnapshotLabel(s), id));
      });
      snapshotSelect.disabled = false;
      const newest = sorted.find((s) => Number(s.staleness) === 1) || sorted[0];
      if (newest) {
        snapshotSelect.value = String(newest.id);
        onSnapshotSelected();
      }
    }

    function onSnapshotSelected() {
      const id = snapshotSelect.value;
      if (!id || !snapshotsById[id]) {
        renderSnapshotDetail(null);
        show('Odaberi snapshot iz liste.', false);
        return;
      }
      const s = snapshotsById[id];
      renderSnapshotDetail(s);
      show(JSON.stringify(s, null, 2), false);
      meta.textContent = 'snapshot_id=' + id + ' (za API: ?snapshot_id=' + id + ')';
    }

    async function loadSnapshotsDropdown() {
      snapshotSelect.disabled = true;
      snapshotSelect.innerHTML = '<option value="">Učitavam…</option>';
      const t0 = performance.now();
      try {
        const res = await fetch('/api/sudreg/snapshots', { headers: { Accept: 'application/json' } });
        const ms = Math.round(performance.now() - t0);
        const body = await res.json();
        if (!res.ok || !body.ok) {
          throw new Error(body.error || res.statusText);
        }
        const list = normalizeSnapshotsList(body.data);
        fillSnapshotDropdown(list);
        meta.textContent = 'Učitano snimki: ' + list.length + ' · ' + ms + ' ms';
        if (!list.length) show('API je vratio prazan popis snimki.', true);
      } catch (e) {
        snapshotSelect.innerHTML = '<option value="">Greška učitavanja</option>';
        snapshotSelect.disabled = true;
        show('Greška: ' + (e.message || String(e)), true);
        meta.textContent = '/api/sudreg/snapshots';
      }
    }

    async function fetchPath(path, asJson) {
      setBusy(true);
      meta.textContent = '';
      const t0 = performance.now();
      try {
        const res = await fetch(path, { headers: { Accept: asJson ? 'application/json' : 'text/plain' } });
        const ms = Math.round(performance.now() - t0);
        meta.textContent = res.status + ' ' + res.statusText + ' · ' + ms + ' ms · ' + path;
        if (asJson) {
          const data = await res.json();
          show(JSON.stringify(data, null, 2), !res.ok);
        } else {
          const text = await res.text();
          show(text, !res.ok);
        }
      } catch (e) {
        show('Greška: ' + (e.message || String(e)), true);
        meta.textContent = path;
      } finally {
        setBusy(false);
      }
    }

    snapshotSelect.addEventListener('change', onSnapshotSelected);
    btnStatus.addEventListener('click', () => fetchPath('/api/status', true));
    btnHealth.addEventListener('click', () => fetchPath('/health', false));
    btnSudreg.addEventListener('click', () => fetchPath('/api/sudreg/token-info', true));
    btnSnapshotsRefresh.addEventListener('click', () => loadSnapshotsDropdown());
    btnSnapshotsJson.addEventListener('click', () => fetchPath('/api/sudreg/snapshots', true));

    function parsePromjenePaging(input, fallback) {
      const n = Number.parseInt(String(input.value).trim(), 10);
      if (!Number.isFinite(n) || n < 0) return fallback;
      return n;
    }

    async function fetchPromjene() {
      const snapshotId = snapshotSelect.value;
      if (!snapshotId || !snapshotsById[snapshotId]) {
        show('Odaberi snapshot u listi prije dohvata promjena.', true);
        return;
      }
      const offset = parsePromjenePaging(promjeneOffset, 0);
      const limit = parsePromjenePaging(promjeneLimit, 1000);
      if (limit < 1) {
        show('limit mora biti >= 1.', true);
        return;
      }
      promjeneOffset.value = String(offset);
      promjeneLimit.value = String(limit);
      const qs = new URLSearchParams({
        snapshot_id: snapshotId,
        offset: String(offset),
        limit: String(limit)
      });
      await fetchPath('/api/sudreg/promjene?' + qs.toString(), true);
    }

    btnPromjene.addEventListener('click', () => fetchPromjene());

    loadSnapshotsDropdown();
  </script>
</body>
</html>
