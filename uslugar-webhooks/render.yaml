# Render Blueprint: Web servis + PostgreSQL
# Ako je repo monorepo, u Render UI postavi Root Directory na `uslugar-webhooks`.
# Outbound IP rasponi za whitelist vanjskih API-ja: vidi `render-network.txt`.

databases:
  - name: uslugar-webhooks-db
    databaseName: uslugar_webhooks
    user: webhooks

services:
  - type: web
    name: uslugar-webhooks
    runtime: node
    plan: starter
    healthCheckPath: /health
    buildCommand: npm ci && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: uslugar-webhooks-db
          property: connectionString
      # Ručno u dashboardu: VERIFY_TOKEN, FACEBOOK_APP_SECRET, INGEST_API_KEY,
      # META_WEBHOOK_PROFILES, META_*_VERIFY_TOKEN, META_*_APP_SECRET, META_*_DATABASE_URL
